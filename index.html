<!doctype html>
<html lang="en" data-theme="dark" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#131416">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meso">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Meso</title>
<style>
/* ============ Design tokens — read from RP's own daisyUI theme bundle ============ */
:root{
  --p:#FC2230; --pf:#E70413; --pc:#FFFFFF;
  --b1:#2F2F32; --b2:#252627; --b3:#131416; --bc:#F3F5F7;
  --in:#3D4576; --inc:#7D8FF2;
  --su:#226749; --suc:#48D598;
  --wa:#746539; --wac:#EFD176;
  --er:#6D3743; --erc:#D86F86;
  --chip-off:#502529;           /* unselected feedback chip: desaturated maroon, NOT gray */
  --emerald:#10B981;            /* next-actionable LOG checkbox */
  --push:#E03EC3; --pull:#24B8D9; --legs:#2FB890; --acc:#7C49F0;
  --line:rgba(243,245,247,.10); /* rp-border: 10% hairline */
  --r-box:1rem; --r-btn:4px;
  --tap:56px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html[data-theme=light]{
  --b1:#FFFFFF; --b2:#F7F7F7; --b3:#E8E8E8; --bc:#0E1116;
  --in:#E1F3FE; --inc:#0284C5; --su:#D1F5E5; --suc:#36A170;
  --wa:#FBF5DF; --wac:#907C47; --er:#F5DBE1; --erc:#A25364;
  --chip-off:#EADADC; --line:rgba(14,17,22,.10);
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overscroll-behavior-y:none}
body{
  background:var(--b3); color:var(--bc);
  font-family:"TASA Orbiter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.25;
  -webkit-font-smoothing:antialiased;
  padding-bottom:calc(64px + var(--safe-b));
}
h1,h2,h3,h4{font-family:"Funnel Display",ui-sans-serif,system-ui,sans-serif;font-weight:700;margin:0}
h1{font-size:2.125rem;line-height:2.125rem} h2{font-size:1.625rem;line-height:1.875rem}
h3{font-size:1.4375rem;line-height:1.625rem} h4{font-size:1.3125rem;line-height:1.375rem}
.mono,.num{font-family:"Martian Mono",ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}
.xxs{font-size:.66rem} .xs{font-size:.75rem;line-height:.9375rem} .sm{font-size:.875rem;line-height:1.125rem}
.lead{font-size:1.0625rem;line-height:1.25rem}
.dim{color:var(--bc);opacity:.55} .dim2{color:var(--bc);opacity:.4}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
input{font:inherit;color:inherit}
.hide{display:none!important}

/* ============ Layout ============ */
.wrap{max-width:560px;margin:0 auto;padding:0 12px}
.hd{position:sticky;top:0;z-index:20;background:var(--b3);padding:12px 0 8px;
    padding-top:calc(12px + env(safe-area-inset-top,0px))}
.hd-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hd h2{letter-spacing:-.01em}
.hd h2 .d{opacity:.45}
.card{background:var(--b2);border-radius:var(--r-box);border:1px solid var(--line);margin-bottom:10px;overflow:hidden}
.row{display:flex;align-items:center;gap:10px;padding:14px;min-height:var(--tap);border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.row.tap:active{background:var(--b1)}
.grow{flex:1;min-width:0}
.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{background:var(--p);color:var(--pc);border-radius:var(--r-btn);padding:0 16px;min-height:var(--tap);
     font-weight:600;display:inline-flex;align-items:center;justify-content:center;transition:transform .25s}
.btn:active{transform:scale(.95)}
.btn.ghost{background:transparent;color:var(--bc);border:1px solid var(--line)}
.btn.wide{width:100%}
.btn[disabled]{opacity:.4;pointer-events:none}
.seg{display:flex;background:var(--b1);border-radius:var(--r-btn);padding:3px;gap:3px}
.seg button{flex:1;min-height:40px;border-radius:2px;font-size:.875rem;opacity:.6}
.seg button[aria-selected=true]{background:var(--p);color:var(--pc);opacity:1;font-weight:600}

/* ============ Muscle pill — RP's ▐▐▐ glyph ============ */
.mg{display:inline-flex;align-items:center;gap:7px;padding:5px 10px;border-radius:var(--r-btn);
    font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.bars{display:inline-flex;gap:2px}
.bars i{width:3px;height:11px;border-radius:1px;background:currentColor;display:block}
.bars i.off{opacity:.28}

/* ============ Tab bar ============ */
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:var(--b2);
      border-top:1px solid var(--line);padding-bottom:var(--safe-b)}
.tabs button{flex:1;padding:8px 2px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;
             font-size:.66rem;opacity:.45;min-height:56px}
.tabs button[aria-selected=true]{opacity:1;color:var(--bc)}
.tabs svg{width:22px;height:22px;stroke-width:1.75}

/* ============ Set table — WEIGHT | REPS | LOG ============ */
.ex{padding:14px}
.ex-hd{display:flex;align-items:flex-start;gap:8px;margin-bottom:2px}
.ex-nm{font-weight:700;font-size:1.0625rem;line-height:1.25rem}
.note{display:flex;align-items:center;gap:8px;background:var(--wa);color:var(--wac);
      border-radius:var(--r-btn);padding:8px 10px;font-size:.8125rem;margin:10px 0}
.sets{margin-top:10px}
.sets-hd{display:grid;grid-template-columns:1fr 1fr 56px;gap:8px;padding:0 2px 6px;
         font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;opacity:.45}
.sets-hd>*:nth-child(3){text-align:center}
.set{display:grid;grid-template-columns:1fr 1fr 56px;gap:8px;align-items:center;margin-bottom:8px}
.stp{display:flex;align-items:center;background:var(--b1);border-radius:var(--r-btn);
     border:1px solid transparent;overflow:hidden;height:52px}
.stp:focus-within{border-color:var(--p)}
.stp button{width:38px;height:100%;font-size:1.25rem;opacity:.5;flex:none}
.stp button:active{background:var(--p);opacity:1}
.stp input{flex:1;min-width:0;width:100%;text-align:center;background:none;border:0;outline:none;
           font-family:"Martian Mono",ui-monospace,monospace;font-size:1.0625rem;font-variant-numeric:tabular-nums;padding:0}
.stp input::-webkit-outer-spin-button,.stp input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stp.done{opacity:.45}
.log{width:56px;height:52px;border-radius:var(--r-btn);border:2px solid var(--line);
     display:flex;align-items:center;justify-content:center;justify-self:center}
.log[data-s=next]{border-color:var(--emerald)}
.log[data-s=done]{background:var(--emerald);border-color:var(--emerald);color:#06251A}
.log[data-s=skip]{opacity:.3;border-style:dashed}
.log svg{width:22px;height:22px;stroke-width:3}
.log[data-s=pending] svg,.log[data-s=next] svg{opacity:.35}
/* target strip — appears on FOCUS only, like RP */
.tgt{grid-column:1/-1;font-size:.75rem;opacity:.7;height:0;overflow:hidden;transition:height .15s;padding-left:2px}
.set.focus .tgt{height:26px;line-height:26px}
.tgt b{color:var(--p);font-weight:600}

/* warm-up rows — visibly scaffolding, not training */
.set.warm{grid-template-areas:"tag tag tag" "w r l";margin-bottom:6px}
.set.warm .wtag{grid-area:tag;font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;
                opacity:.4;font-weight:700;margin-bottom:2px}
.set.warm .stp{height:42px;background:transparent;border:1px dashed var(--line)}
.set.warm .stp input{font-size:.9375rem;opacity:.75}
.set.warm .log{height:42px;border-style:dashed;opacity:.6}
.set.warm .log[data-s=done]{opacity:1;border-style:solid}

/* ============ Feedback sheet ============ */
.sheet-bg{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--b2);
       border-radius:var(--r-box) var(--r-box) 0 0;max-height:92vh;overflow-y:auto;
       transform:translateY(101%);transition:transform .25s cubic-bezier(.2,.8,.2,1);
       padding:18px 16px calc(18px + var(--safe-b));-webkit-overflow-scrolling:touch}
.sheet.on{transform:none}
.q{margin:18px 0 0}
.q-l{display:flex;align-items:center;gap:6px;font-weight:700;font-size:1.0625rem}
.q-h{font-size:.8125rem;opacity:.55;margin:4px 0 9px;line-height:1.15rem}
.opts{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:7px}
.opts.w4{grid-auto-flow:row;grid-template-columns:repeat(4,1fr)}
.opt{background:var(--chip-off);color:var(--bc);border-radius:var(--r-btn);min-height:var(--tap);
     padding:6px 4px;font-size:.8125rem;line-height:1rem;display:flex;align-items:center;justify-content:center;text-align:center}
.opt[aria-pressed=true]{background:var(--p);color:var(--pc);font-weight:600}
.help{width:18px;height:18px;border-radius:50%;border:1px solid var(--line);font-size:.66rem;
      display:inline-flex;align-items:center;justify-content:center;opacity:.5;flex:none}
.sheet-ft{display:flex;justify-content:flex-end;align-items:center;gap:14px;margin-top:22px;
          position:sticky;bottom:0;background:var(--b2);padding:10px 0 0}

/* ============ Today: the two clocks ============ */
.eyebrow{font-size:.66rem;letter-spacing:.1em;opacity:.45;font-weight:700;margin-bottom:3px}
.hd-act{display:flex;gap:6px;align-items:center;flex:none}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--b1);border:1px solid var(--line);
      border-radius:var(--r-btn);padding:8px 10px;font-size:.75rem;white-space:nowrap;max-width:132px}
.chip span.t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip:active{background:var(--b2)}
.wkstrip{display:grid;grid-template-columns:repeat(7,1fr);padding:14px 8px 12px;border-bottom:1px solid var(--line)}
.wkd{display:flex;flex-direction:column;align-items:center;gap:8px}
.wkl{font-size:.66rem;letter-spacing:.06em;opacity:.4;font-weight:700}
/* 🔑 THE anti-guilt line. An untrained Monday and an untrained future Sunday are the SAME pixel.
   There is no "missed" state, because the plan never claimed a weekday. */
.dot{width:9px;height:9px;border-radius:50%;background:var(--bc);opacity:.16;display:block}
.dot.on{opacity:1;background:var(--c,var(--p));box-shadow:0 0 0 3px color-mix(in srgb,var(--c,var(--p)) 22%,transparent)}
.wkd.now .wkl{opacity:1;color:var(--bc)}
.wkd.now .dot{box-shadow:0 0 0 2px var(--bc)}   /* today = a ring, not a demand */
.pbar{height:5px;border-radius:3px;background:var(--b1);overflow:hidden}
.pbar i{display:block;height:100%;background:var(--emerald);border-radius:3px;transition:width .3s}
.pills{display:flex;flex-wrap:wrap;gap:6px}

/* ============ Workout clock + quick-fill ============ */
.wkclock-row{align-items:center;gap:12px}
.wkclock-box{display:flex;flex-direction:column;align-items:center;flex:none;min-width:74px;
  padding:8px 12px;border:1px solid var(--line);border-radius:var(--r-btn);background:var(--b1)}
.wkclock{font-size:1.35rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.02em}
.wkpace{font-size:.66rem;font-weight:600;letter-spacing:.03em;margin-top:2px;color:var(--dim2,#8a8f98)}
.wkpace.ok{color:var(--emerald)}
.wkpace.ahead{color:var(--emerald)}
.wkpace.behind{color:var(--wac,#e0a33a)}
.wkpace.paused{color:var(--wac,#e0a33a)}
.wkclock-box.paused{border-color:var(--wac,#e0a33a);border-style:dashed}
.wkctl{display:flex;gap:8px;margin:14px 0 20px}
.wkctl .btn{flex:1;min-height:52px;padding:0 8px}
.wkctl .btn.ghost{flex:0 0 auto;padding:0 16px}
.qf{display:flex;flex-wrap:wrap;gap:8px;padding:10px 2px 2px}
.qfb{border:1px solid var(--line);border-radius:var(--r-btn);padding:8px 14px;font-size:.8rem;
  font-weight:600;background:var(--b1);flex:none}
.qfb:active{border-color:var(--p);background:color-mix(in srgb,var(--p) 10%,transparent)}

/* ============ Swap ============ */
.swapb{border:1px solid var(--line);border-radius:var(--r-btn);padding:7px 11px;
       font-size:.75rem;font-weight:600;opacity:.75;flex:none}
.swapb:active{background:var(--b1);opacity:1}
.swapb.pain{border-color:var(--erc);color:var(--erc);opacity:1}
.pick{border:1px solid var(--line);border-radius:var(--r-btn);margin-top:8px}
.pick[aria-pressed=true]{border-color:var(--p);background:color-mix(in srgb,var(--p) 8%,transparent)}
.sheet-ft .btn{min-height:48px;padding:0 14px;flex:1}

/* ============ Calendar ============ */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:10px 12px 14px}
.cald{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      border-radius:var(--r-btn);font-size:.66rem}
.cald.tap:active{background:var(--b1)}
.cald .n{opacity:.45;font-family:"Martian Mono",ui-monospace,monospace}
.cald.today .n{opacity:1;font-weight:700}
.cald.blank{visibility:hidden}
.calhd{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:4px 12px 0}
.calhd div{text-align:center;font-size:.66rem;opacity:.35;font-weight:700}

/* ============ Rest timer — sits above the tab bar, visible from every screen ============ */
.rest{position:fixed;left:0;right:0;bottom:calc(64px + var(--safe-b));z-index:29;
      background:var(--b1);border-top:1px solid var(--line);
      display:flex;align-items:center;gap:12px;padding:10px 14px;
      transform:translateY(120%);transition:transform .22s cubic-bezier(.2,.8,.2,1)}
.rest.on{transform:none}
.rest .t{font-family:"Martian Mono",ui-monospace,monospace;font-size:1.4375rem;font-weight:700;
         font-variant-numeric:tabular-nums;min-width:74px;letter-spacing:-.02em}
.rest .lab{flex:1;min-width:0;font-size:.75rem;line-height:1rem;opacity:.6}
.rest .lab b{opacity:1;font-weight:700}
.rest button{border:1px solid var(--line);border-radius:var(--r-btn);padding:9px 12px;
             font-size:.75rem;font-weight:600;flex:none}
.rest button:active{background:var(--b2)}
.rest[data-s=resting] .t{color:var(--bc)}
.rest[data-s=ready]{background:color-mix(in srgb,var(--su) 55%,var(--b1))}
.rest[data-s=ready] .t{color:var(--suc)}
.rest[data-s=cold]{background:color-mix(in srgb,var(--wa) 45%,var(--b1))}
.rest[data-s=cold] .t{color:var(--wac)}
.rest .bar{position:absolute;left:0;top:0;height:2px;background:var(--suc);opacity:.85;transition:width .5s linear}

/* ============ Focus picker ============ */
.fchip{display:inline-flex;align-items:center;gap:7px;padding:11px 13px;border-radius:var(--r-btn);
       border:1px solid var(--line);font-size:.8125rem;font-weight:600;min-height:44px}
.fchip b{font-family:"Martian Mono",ui-monospace,monospace;font-size:.75rem;opacity:.85}
.fchip[aria-pressed=true]{opacity:1}
.fchip:active{transform:scale(.96)}

/* ============ Mobile lockdown ============
   A phone app must not wiggle. No horizontal scroll, ever — one overflowing card makes the whole
   page slide side-to-side and every swipe fights you. Vertical panning only; anything wide wraps. */
html,body{overflow-x:hidden;max-width:100vw}
body{touch-action:pan-y}
.seg,.pills,.tabs,.rest,.sheet-ft{touch-action:manipulation}
.seg{flex-wrap:wrap}
.seg button{min-width:0}
.ex-nm,.lead,.q-l{overflow-wrap:anywhere}
.card,.sheet,.pick{min-width:0}
/* iOS zooms the page on focus if an input is under 16px. Every input is 16px+ or it's a bug. */
input{font-size:max(1rem,16px)}
/* The rest bar floats above the tab bar — give the page room so it never covers the last card. */
body.resting{padding-bottom:calc(64px + 58px + var(--safe-b))}

/* ============ Week board — the selectable workouts ============ */
.wbrow{display:flex;gap:6px;padding:12px 12px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.wbday{flex:1 0 auto;min-width:70px;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 8px;border-radius:var(--r-btn);border:1px solid var(--line);background:var(--b1)}
.wbday .wbn{font-size:.75rem;font-weight:700;white-space:nowrap}
.wbday .wbmark{font-size:.9rem;line-height:1;height:14px;color:var(--c)}
.wbday[data-s=now]{border-color:var(--c);background:color-mix(in srgb,var(--c) 16%,var(--b1))}
.wbday[data-s=now] .wbn{color:var(--c)}
.wbday[data-s=done]{opacity:.5;border-style:solid}
.wbday[data-s=done] .wbmark{color:var(--suc)}
.wbday[data-s=part]{border-color:var(--wac)}
.wbday[data-s=part] .wbmark{color:var(--wac)}
.wbday:not([disabled]):active{transform:scale(.96)}

/* ============ Exercise demos ============ */
.demo-glyph{opacity:.4;font-size:.8em;margin-left:2px}
.demo{padding:4px 0 2px}
/* contain, NOT cover — cover was cropping every clip to a square and cutting the movement off.
   Smaller, letterboxed on the dark card, whole rep always visible. */
.demo video,.demo-img{display:block;width:100%;max-width:240px;max-height:220px;object-fit:contain;
  border-radius:var(--r-btn);background:#000;margin:0 auto}
.thumb{object-fit:contain!important;background:#0a0a0a!important}
.thumb{width:46px;height:46px;border-radius:var(--r-btn);object-fit:cover;background:var(--b1);flex:none}
.exhd-tap{padding:0;min-width:0}

/* ============ Coach banner ============ */
.coachbar{position:fixed;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;gap:10px;
  justify-content:center;flex-wrap:wrap;background:var(--wac);color:#20160a;font-size:.8125rem;font-weight:700;
  padding:9px 12px;padding-top:calc(9px + env(safe-area-inset-top,0px))}
.coachbar button{border:1px solid currentColor;border-radius:var(--r-btn);padding:5px 12px;font-weight:700}
/* Push the whole app below the fixed coach banner so it never overlaps the sticky header. */
body.coaching{padding-top:calc(42px + env(safe-area-inset-top,0px))}
body.coaching .hd{top:calc(42px + env(safe-area-inset-top,0px))}
body.coaching{box-shadow:inset 0 0 0 2px var(--wac)}

/* Day-chooser landing cards */
.daycard{cursor:pointer;transition:transform .15s}
.daycard:active{transform:scale(.99)}
.daycard[data-s=now]{border-color:var(--acc)}
.daycard[data-s=done]{opacity:.55}
.daycard[data-s=part]{border-color:var(--wac)}

/* Welcome / help steps */
.wsteps{display:flex;flex-direction:column;gap:12px}
.wsteps>div{display:flex;gap:10px;align-items:flex-start;font-size:.875rem;line-height:1.2rem}
.wnum{flex:none;width:22px;height:22px;border-radius:50%;background:var(--p);color:var(--pc);
  font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
.welcome-ov{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);display:flex;
  align-items:center;justify-content:center;padding:20px;padding-top:calc(20px + env(safe-area-inset-top,0px))}
.welcome-card{background:var(--b2);border:1px solid var(--line);border-radius:var(--r-box);
  padding:20px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto}

/* ============ Bits ============ */
.badge{font-size:.66rem;padding:3px 7px;border-radius:var(--r-btn);font-weight:700;letter-spacing:.04em}
.b-up{background:var(--su);color:var(--suc)} .b-mid{background:var(--b1);color:var(--bc)}
.b-dn{background:var(--er);color:var(--erc)} .b-warn{background:var(--wa);color:var(--wac)}
.b-info{background:var(--in);color:var(--inc)}
.toast{position:fixed;left:50%;bottom:calc(76px + var(--safe-b));transform:translate(-50%,20px);z-index:50;
       background:var(--b1);border:1px solid var(--line);border-radius:var(--r-btn);padding:11px 15px;
       font-size:.875rem;opacity:0;pointer-events:none;transition:all .2s;max-width:90vw;text-align:center}
.toast.on{opacity:1;transform:translate(-50%,0)}
.empty{text-align:center;padding:44px 20px;opacity:.45;font-size:.875rem}
.sync{display:flex;align-items:center;gap:6px;font-size:.66rem;opacity:.45;justify-content:center;padding:10px 0}
.sync .dot{width:6px;height:6px;border-radius:50%;background:var(--suc)}
.sync.stale .dot{background:var(--wac)} .sync.bad .dot{background:var(--erc)}
.stat{display:grid;grid-template-columns:88px 1fr;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.wk{display:flex;gap:4px;align-items:flex-end;height:38px}
.wk div{flex:1;border-radius:2px 2px 0 0;background:var(--b1);display:flex;align-items:flex-end;
        justify-content:center;font-size:.66rem;padding-bottom:2px;min-height:12px;font-family:"Martian Mono",monospace}
</style>
